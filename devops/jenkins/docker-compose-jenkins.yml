version: '3.8'

services:
  jenkins:
    build:
      context: .
      dockerfile: jenkins.Dockerfile
    container_name: revworkforce-jenkins
    user: root
    privileged: true
    ports:
      - "8090:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - revworkforce-network
    restart: unless-stopped

networks:
  revworkforce-network:
    external: true
    name: revworkforce-network

volumes:
  jenkins_home:
