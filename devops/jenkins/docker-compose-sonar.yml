version: '3.8'

services:
  sonarqube:
    image: sonarqube:9.9-community
    container_name: revworkforce-sonarqube
    ports:
      - "9000:9000"
    networks:
      - revworkforce-network
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    restart: unless-stopped

networks:
  revworkforce-network:
    external: true
    name: revworkforce-network

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
