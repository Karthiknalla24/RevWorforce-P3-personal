apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: revworkforce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: revworkforce/notification-service:latest
        ports:
        - containerPort: 8085
        env:
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: MYSQL_PASSWORD
        - name: SPRING_DATASOURCE_URL
          value: "$(MYSQL_URL)notification_db"
        envFrom:
        - configMapRef:
            name: app-config
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: revworkforce
spec:
  selector:
    app: notification-service
  ports:
    - protocol: TCP
      port: 8085
      targetPort: 8085
