apiVersion: apps/v1
kind: Deployment
metadata:
  name: revworkforce-ui
  namespace: revworkforce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: revworkforce-ui
  template:
    metadata:
      labels:
        app: revworkforce-ui
    spec:
      containers:
      - name: revworkforce-ui
        image: revworkforce/revworkforce-ui:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: revworkforce-ui
  namespace: revworkforce
spec:
  selector:
    app: revworkforce-ui
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
